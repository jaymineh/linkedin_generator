name: Pipeline

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

concurrency:
  group: pipeline-${{ github.ref }}
  cancel-in-progress: true

env:
  RESOURCE_GROUP: ${{ secrets.AZURE_RESOURCE_GROUP }}
  TF_IN_AUTOMATION: "true"
  TF_INPUT: "false"
  BACKEND_IMAGE_TAG: ${{ github.sha }}
  ARM_USE_OIDC: "true"
  ARM_USE_AZUREAD: "true"
  ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
  ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

jobs:
  codescan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "1.6.6"

      - name: Validate Python syntax
        run: python -m compileall backend scripts

      - name: Validate Terraform formatting and config
        run: |
          terraform -chdir=terraform fmt -check
          terraform -chdir=terraform init -backend=false
          terraform -chdir=terraform validate

  test:
    needs: codescan
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: linkedin_gen_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d linkedin_gen_test"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        run: pip install -r backend/requirements.txt

      - name: Run backend tests
        run: python -m pytest backend/tests/ -v
        env:
          PYTHONPATH: backend
          DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/linkedin_gen_test"
          OPENAI_API_KEY: "test-key"

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Build backend Docker image
        run: docker build ./backend -t backend:ci

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          NEXT_PUBLIC_API_URL=http://localhost:8000 \
          NEXT_PUBLIC_APPLICATIONINSIGHTS_CONNECTION_STRING="" \
          npm run build

  plan:
    needs: build
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "1.6.6"

      - name: Terraform init
        working-directory: terraform
        run: |
          terraform init \
            -backend-config="use_oidc=true" \
            -backend-config="use_azuread_auth=true" \
            -backend-config="resource_group_name=${{ secrets.TF_BACKEND_RESOURCE_GROUP }}" \
            -backend-config="storage_account_name=${{ secrets.TF_BACKEND_STORAGE_ACCOUNT }}" \
            -backend-config="container_name=${{ secrets.TF_BACKEND_CONTAINER }}" \
            -backend-config="key=${{ secrets.TF_BACKEND_KEY }}"

      - name: Terraform plan
        working-directory: terraform
        run: |
          terraform plan -no-color \
            -var="openai_api_key=${{ secrets.OPENAI_API_KEY }}" \
            -var="db_password=${{ secrets.DB_PASSWORD }}" \
            -var="alert_email=${{ secrets.ALERT_EMAIL }}" \
            -var="backend_image_tag=${BACKEND_IMAGE_TAG}" \
            -var="allowed_origins=*"

  deploy:
    needs: plan
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "1.6.6"

      - name: Terraform init
        working-directory: terraform
        run: |
          terraform init \
            -backend-config="use_oidc=true" \
            -backend-config="use_azuread_auth=true" \
            -backend-config="resource_group_name=${{ secrets.TF_BACKEND_RESOURCE_GROUP }}" \
            -backend-config="storage_account_name=${{ secrets.TF_BACKEND_STORAGE_ACCOUNT }}" \
            -backend-config="container_name=${{ secrets.TF_BACKEND_CONTAINER }}" \
            -backend-config="key=${{ secrets.TF_BACKEND_KEY }}"

      - name: Bootstrap resource group and ACR
        working-directory: terraform
        run: |
          RG_EXISTS=$(az group exists --name "$RESOURCE_GROUP")
          ACR_NAME=$(az acr list -g "$RESOURCE_GROUP" --query "[0].name" -o tsv 2>/dev/null || true)
          if [ "$RG_EXISTS" = "true" ] && [ -n "$ACR_NAME" ]; then
            echo "Resource group and ACR already exist. Skipping targeted bootstrap apply."
          else
            terraform apply -auto-approve \
              -target=azurerm_resource_group.main \
              -target=azurerm_container_registry.acr \
              -var="openai_api_key=${{ secrets.OPENAI_API_KEY }}" \
              -var="db_password=${{ secrets.DB_PASSWORD }}" \
              -var="alert_email=${{ secrets.ALERT_EMAIL }}" \
              -var="backend_image_tag=${BACKEND_IMAGE_TAG}" \
              -var="allowed_origins=*"
          fi

      - name: Get ACR details
        id: acr
        run: |
          ACR_NAME=$(az acr list -g "$RESOURCE_GROUP" --query "[0].name" -o tsv)
          echo "name=$ACR_NAME" >> "$GITHUB_OUTPUT"
          echo "server=$(az acr show -n "$ACR_NAME" --query loginServer -o tsv)" >> "$GITHUB_OUTPUT"

      - name: Build and push backend image
        run: |
          ACR_SERVER="${{ steps.acr.outputs.server }}"
          ACR_USERNAME=$(az acr credential show -n "${{ steps.acr.outputs.name }}" --query username -o tsv)
          ACR_PASSWORD=$(az acr credential show -n "${{ steps.acr.outputs.name }}" --query "passwords[0].value" -o tsv)
          docker login "$ACR_SERVER" -u "$ACR_USERNAME" -p "$ACR_PASSWORD"
          docker build ./backend \
            -t "$ACR_SERVER/backend:${BACKEND_IMAGE_TAG}" \
            -t "$ACR_SERVER/backend:latest"
          docker push "$ACR_SERVER/backend:${BACKEND_IMAGE_TAG}"
          docker push "$ACR_SERVER/backend:latest"

      - name: Apply infrastructure
        working-directory: terraform
        run: |
          terraform apply -auto-approve \
            -var="openai_api_key=${{ secrets.OPENAI_API_KEY }}" \
            -var="db_password=${{ secrets.DB_PASSWORD }}" \
            -var="alert_email=${{ secrets.ALERT_EMAIL }}" \
            -var="backend_image_tag=${BACKEND_IMAGE_TAG}" \
            -var="allowed_origins=*"

      - name: Capture Terraform outputs
        run: |
          echo "BACKEND_URL=$(terraform -chdir=terraform output -raw backend_url)" >> "$GITHUB_ENV"
          echo "FRONTEND_URL=$(terraform -chdir=terraform output -raw frontend_url)" >> "$GITHUB_ENV"
          echo "API_BASE_URL=$(terraform -chdir=terraform output -raw api_base_url)" >> "$GITHUB_ENV"
          echo "APP_INSIGHTS_CONNECTION_STRING=$(terraform -chdir=terraform output -raw app_insights_connection_string)" >> "$GITHUB_ENV"

      - name: Smoke test backend readiness
        run: curl --fail --silent --show-error "$BACKEND_URL/health/ready"

      - name: Get Static Web App deploy token
        id: swa
        run: |
          SWA_NAME=$(az staticwebapp list -g "$RESOURCE_GROUP" --query "[0].name" -o tsv)
          TOKEN=$(az staticwebapp secrets list -n "$SWA_NAME" -g "$RESOURCE_GROUP" --query "properties.apiKey" -o tsv)
          echo "token=$TOKEN" >> "$GITHUB_OUTPUT"

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          NEXT_PUBLIC_API_URL="$API_BASE_URL" \
          NEXT_PUBLIC_APPLICATIONINSIGHTS_CONNECTION_STRING="$APP_INSIGHTS_CONNECTION_STRING" \
          npm run build

      - name: Deploy frontend
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ steps.swa.outputs.token }}
          action: "upload"
          app_location: "frontend/out"
          skip_app_build: true

      - name: Tighten CORS to deployed frontend
        working-directory: terraform
        run: |
          terraform apply -auto-approve \
            -var="openai_api_key=${{ secrets.OPENAI_API_KEY }}" \
            -var="db_password=${{ secrets.DB_PASSWORD }}" \
            -var="alert_email=${{ secrets.ALERT_EMAIL }}" \
            -var="backend_image_tag=${BACKEND_IMAGE_TAG}" \
            -var="allowed_origins=${FRONTEND_URL}"

      - name: Final smoke tests
        run: |
          curl --fail --silent --show-error "$BACKEND_URL/health/ready"
          curl --fail --silent --show-error "$FRONTEND_URL"
